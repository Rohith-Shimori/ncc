name: Deploy Database Migrations

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: # Allows manual deployment from GitHub Actions tab

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Deploy Pending Migrations to Production Supabase
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      run: |
        supabase link --project-ref czyjaeszmnyiwjilkhls --password "$SUPABASE_DB_PASSWORD"
        # Repair the migration history table for old remote versions that do not exist locally
        supabase migration repair --status reverted 20260611090348 20260611090430 20260611090742 20260611100821 --password "$SUPABASE_DB_PASSWORD"
        supabase db push --password "$SUPABASE_DB_PASSWORD"
